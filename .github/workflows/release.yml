name: Build and Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x86_64
            rust-target: ""
          - os: ubuntu-latest
            platform: linux-x86_64
            rust-target: ""
          - os: macos-latest
            platform: darwin-x86_64
            rust-target: ""
          - os: macos-14  # Apple Silicon runner
            platform: darwin-aarch64
            rust-target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libxdo-dev

      - name: Install frontend deps
        run: bun install

      - name: Download FFmpeg
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          case "${{ runner.os }}" in
            Windows)
              curl -fsSL https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -o ff.zip
              unzip -j ff.zip "*/bin/ffmpeg.exe"   -d src-tauri/binaries
              unzip -j ff.zip "*/bin/ffprobe.exe"  -d src-tauri/binaries
              ;;
            Linux)
              curl -fsSL https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz -o ff.tar.xz
              tar xf ff.tar.xz
              cp ffmpeg-master-latest-linux64-gpl/bin/ffmpeg  src-tauri/binaries/
              cp ffmpeg-master-latest-linux64-gpl/bin/ffprobe src-tauri/binaries/
              chmod +x src-tauri/binaries/*
              ;;
            macOS)
              curl -fsSL https://evermeet.cx/ffmpeg/ffmpeg-7.1.zip -o ffmpeg.zip
              curl -fsSL https://evermeet.cx/ffprobe/ffprobe-7.1.zip -o ffprobe.zip
              unzip -j ffmpeg.zip  -d src-tauri/binaries
              unzip -j ffprobe.zip -d src-tauri/binaries
              chmod +x src-tauri/binaries/*
              ;;
          esac

      - name: Download whisper-cli
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          curl -fsSL https://github.com/ggml-org/whisper.cpp/releases/latest/download/whisper-bin-x64.zip -o whisper.zip
          unzip -o whisper.zip -d whisper-extract
          # The zip may contain a subdirectory — copy all relevant files up
          find whisper-extract -type f \( -name "whisper-cli*" -o -name "whisper.dll" -o -name "whisper.lib" -o -name "whisper.dylib" -o -name "whisper.so*" -o -name "ggml*" \) \
            -exec cp {} src-tauri/binaries/ \;
          chmod +x src-tauri/binaries/whisper-cli 2>/dev/null || true
          rm -rf whisper.zip whisper-extract

      - name: Build Tauri
        run: bun tauri build
        env:
          CARGO_BUILD_TARGET: ${{ matrix.rust-target }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: error